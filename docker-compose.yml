services:

  # ── Qdrant 벡터 데이터베이스 ────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: writemywords-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
#    healthcheck:
#      test: ["CMD-SHELL", "nc -z localhost 6333 || exit 1"]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 30s

  # ── Spring Boot 백엔드 ──────────────────────────────────────
  backend:
    build:
      context: ./spring-ai-tutorial-rag
      dockerfile: Dockerfile
    container_name: writemywords-backend
    restart: unless-stopped
    env_file:
      - ./spring-ai-tutorial-rag/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
    volumes:
      # 업로드된 문서 파일 영속화
      - backend_files:/app/file
    depends_on:
      - qdrant

  # ── Next.js 프론트엔드 ──────────────────────────────────────
  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: writemywords-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  # ── Nginx 리버스 프록시 ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: writemywords-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  qdrant_data:
    driver: local
  backend_files:
    driver: local
